name: examples

on:
  push:
  pull_request:

jobs:
  run-examples:
    runs-on: ubuntu-latest
    env:
      PERIODIC_MODE: ${{ matrix.mode }}
      PERIODIC_CLIENT_PRIVATE_KEY: client_private.pem
      PERIODIC_SERVER_PUBLIC_KEY: server_public.pem

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        mode: [Normal, Plain, RSA, AES]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Pull periodicd
        run: docker pull lupino/periodicd:1.2.5.0

      - name: Generate RSA keypairs
        run: |
          if [ "${{ matrix.mode }}" = "Normal" ]; then
            exit 0
          fi

          set -euo pipefail

          # Generate PKCS#1 keys (BEGIN RSA PRIVATE KEY) for maximum compatibility
          # OpenSSL 3 `genpkey` does not support `-traditional`; generate PKCS#8 then convert to PKCS#1.
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out client_private.pem
          openssl rsa -in client_private.pem -traditional -out client_private_pkcs1.pem
          mv client_private_pkcs1.pem client_private.pem
          openssl rsa -in client_private.pem -RSAPublicKey_out -out client_public.pem

          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out server_private.pem
          openssl rsa -in server_private.pem -traditional -out server_private_pkcs1.pem
          mv server_private_pkcs1.pem server_private.pem
          openssl rsa -in server_private.pem -RSAPublicKey_out -out server_public.pem

      - name: Start periodicd (tcp :5000)
        run: |
          if [ "${{ matrix.mode }}" = "Normal" ]; then
            docker run -d --name periodicd -p 5000:5000 lupino/periodicd:1.2.5.0
          else
            docker run -d --name periodicd -p 5000:5000 \
              -v "$PWD/server_private.pem:/keys/private.pem:ro" \
              -v "$PWD/client_public.pem:/keys/client_public.pem:ro" \
              -v "$PWD/client_private.pem:/keys/client_private.pem:ro" \
              -v "$PWD/server_public.pem:/keys/public.pem:ro" \
              lupino/periodicd:1.2.5.0 \
              --rsa-private-path /keys/private.pem \
              --rsa-public-path /keys/client_public.pem
          fi

          # wait for port
          for i in $(seq 1 50); do
            (echo > /dev/tcp/127.0.0.1/5000) >/dev/null 2>&1 && break
            sleep 0.2
          done
          (echo > /dev/tcp/127.0.0.1/5000)

      - name: Run echo worker (service)
        run: |
          python examples/echo_worker.py > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Wait for worker registered funcs
        run: |
          # Wait until echo worker has registered expected functions
          for i in $(seq 1 50); do
            if [ "${{ matrix.mode }}" = "Normal" ]; then
              docker exec periodicd periodic status | grep -E "\b(echo|echo_later|test_lock)\b" && exit 0
            else
              docker exec periodicd periodic --rsa-public-path /keys/public.pem --rsa-private-path /keys/client_private.pem status | grep -E "\b(echo|echo_later|test_lock)\b" && exit 0
            fi
            sleep 0.2
          done

          echo "Timed out waiting for worker to register funcs" >&2
          docker exec periodicd periodic status || true
          exit 1

      - name: Run echo client
        run: |
          python examples/echo_client.py

      - name: Cleanup
        if: always()
        run: |
          if [ -f worker.pid ]; then kill "$(cat worker.pid)" || true; fi
          docker logs periodicd || true
          docker rm -f periodicd || true
          cat worker.log || true
